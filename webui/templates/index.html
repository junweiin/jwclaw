<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JwClaw - 智能体系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #000000;
            --secondary-color: #666666;
            --bg-color: #ffffff;
            --chat-bg: #fafafa;
            --border-color: #e5e5e5;
            --hover-bg: #f5f5f5;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--primary-color);
            line-height: 1.6;
        }
        
        /* 简洁的顶部栏 */
        .header {
            padding: 20px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: -0.3px;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--secondary-color);
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
        }
        
        .btn-icon {
            background: none;
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: var(--secondary-color);
            transition: all 0.2s;
        }
        
        .btn-icon:hover {
            background: var(--hover-bg);
            border-color: #d0d0d0;
        }
        
        /* 聊天容器 */
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            height: calc(100vh - 140px);
            display: flex;
            flex-direction: column;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }
        
        /* 消息样式 - 极简 */
        .message {
            margin-bottom: 32px;
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            text-align: right;
        }
        
        .user-message .message-content {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 70%;
            font-size: 15px;
            line-height: 1.5;
        }
        
        .assistant-message {
            text-align: left;
        }
        
        .assistant-message .message-content {
            display: inline-block;
            color: var(--primary-color);
            padding: 0;
            max-width: 100%;
            font-size: 15px;
            line-height: 1.7;
        }
        
        /* 思考过程 - 低调显示 */
        .thinking-content {
            color: #999;
            font-size: 13px;
            margin-bottom: 12px;
            padding: 8px 0;
            border-left: 2px solid #e0e0e0;
            padding-left: 12px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease-in;
        }
        
        /* 工具调用 - 简洁 */
        .tool-call {
            background: #f8f8f8;
            color: #555;
            padding: 10px 14px;
            border-radius: 8px;
            margin: 12px 0;
            font-size: 13px;
            font-family: 'Monaco', 'Consolas', monospace;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { 
                opacity: 0; 
                transform: translateX(-10px); 
            }
            to { 
                opacity: 1; 
                transform: translateX(0); 
            }
        }
        
        .tool-result {
            background: #f8f8f8;
            color: #333;
            padding: 12px 14px;
            border-radius: 8px;
            margin: 12px 0;
            font-size: 13px;
            font-family: 'Monaco', 'Consolas', monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
            border-left: 3px solid #ddd;
            animation: slideIn 0.3s ease-out;
        }
        
        /* 输入区域 - 极简 */
        .chat-input-area {
            padding: 20px 40px;
            border-top: 1px solid var(--border-color);
            background: white;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .typing-indicator {
            display: none;
            padding: 8px 0;
            color: #999;
            font-size: 13px;
        }
        
        .typing-indicator.active {
            display: block;
        }
        
        .input-group {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        
        #user-input {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 15px;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
            min-height: 50px;
            max-height: 150px;
        }
        
        #user-input:focus {
            border-color: #999;
        }
        
        .btn-send {
            background: var(--primary-color);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .btn-send:hover {
            background: #333;
            transform: translateY(-1px);
        }
        
        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Markdown 内容 */
        .markdown-content {
            line-height: 1.8;
        }
        
        .markdown-content p {
            margin-bottom: 12px;
        }
        
        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3 {
            margin-top: 20px;
            margin-bottom: 12px;
            font-weight: 600;
            line-height: 1.4;
        }
        
        .markdown-content h1 { font-size: 1.5em; }
        .markdown-content h2 { font-size: 1.3em; }
        .markdown-content h3 { font-size: 1.1em; }
        
        .markdown-content ul,
        .markdown-content ol {
            margin: 12px 0;
            padding-left: 24px;
        }
        
        .markdown-content li {
            margin-bottom: 6px;
            line-height: 1.6;
        }
        
        .markdown-content strong {
            font-weight: 600;
            color: #000;
        }
        
        .markdown-content code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: 'Monaco', 'Consolas', monospace;
            color: #e83e8c;
        }
        
        .markdown-content pre {
            background: #f8f8f8;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 16px 0;
            border: 1px solid #e5e5e5;
        }
        
        .markdown-content pre code {
            background: none;
            padding: 0;
            color: #333;
        }
        
        .markdown-content blockquote {
            border-left: 3px solid #ddd;
            padding-left: 16px;
            margin: 16px 0;
            color: #666;
            font-style: italic;
        }
        
        .markdown-content hr {
            border: none;
            border-top: 1px solid #e5e5e5;
            margin: 20px 0;
        }
        
        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
        }
        
        .markdown-content th,
        .markdown-content td {
            padding: 8px 12px;
            border: 1px solid #e5e5e5;
            text-align: left;
        }
        
        .markdown-content th {
            background: #f8f8f8;
            font-weight: 600;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #999;
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
        
        .empty-state p {
            font-size: 15px;
        }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #ccc;
        }
        
        /* 模态窗样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
        
        .modal-content {
            position: relative;
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.3s ease-out;
        }
        
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h2 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            color: #999;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.2s;
        }
        
        .modal-close:hover {
            background: var(--hover-bg);
            color: #333;
        }
        
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            max-height: calc(80vh - 80px);
        }
        
        .model-list {
            margin-bottom: 16px;
        }
        
        .model-item {
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .model-item:hover {
            border-color: #999;
            background: var(--hover-bg);
        }
        
        .model-item.active {
            border-color: #000;
            background: #f8f8f8;
        }
        
        .model-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .model-item-name {
            font-weight: 600;
            font-size: 15px;
        }
        
        .model-item-badge {
            background: #000;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .model-item-api {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }
        
        .model-item-desc {
            font-size: 13px;
            color: #999;
        }
        
        .btn-add-model {
            width: 100%;
            padding: 12px;
            border: 2px dashed var(--border-color);
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }
        
        .btn-add-model:hover {
            border-color: #999;
            color: #333;
            background: var(--hover-bg);
        }
        
        .add-model-form {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
        
        .add-model-form h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .form-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .form-input:focus {
            border-color: #999;
        }
        
        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        
        .btn-cancel,
        .btn-save {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-cancel {
            background: white;
            border: 1px solid var(--border-color);
            color: #666;
        }
        
        .btn-cancel:hover {
            background: var(--hover-bg);
        }
        
        .btn-save {
            background: #000;
            border: none;
            color: white;
        }
        
        .btn-save:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <!-- 简洁的顶部栏 -->
    <div class="header">
        <h1>JwClaw</h1>
        <div class="header-actions">
            <button class="btn-icon" onclick="showModelSelector()" id="current-model-btn">
                <span id="model-name">加载中...</span>
                <span style="margin-left: 4px;">▼</span>
            </button>
            <button class="btn-icon" onclick="clearHistory()">
                清空
            </button>
        </div>
    </div>

    <!-- 模型选择模态窗 -->
    <div id="model-modal" class="modal" style="display: none;">
        <div class="modal-overlay" onclick="closeModelSelector()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>选择模型</h2>
                <button class="modal-close" onclick="closeModelSelector()">×</button>
            </div>
            <div class="modal-body">
                <div id="model-list" class="model-list">
                    <!-- 模型列表将动态加载 -->
                </div>
                <button class="btn-add-model" onclick="showAddModelForm()">
                    + 添加新模型
                </button>
                
                <!-- 添加模型表单 -->
                <div id="add-model-form" class="add-model-form" style="display: none;">
                    <h3>添加新模型</h3>
                    <input type="text" id="model-name-input" placeholder="模型名称 (如: gpt-4)" class="form-input">
                    <input type="text" id="model-api-input" placeholder="API地址 (如: https://api.openai.com/v1)" class="form-input">
                    <input type="text" id="model-key-input" placeholder="API密钥" class="form-input">
                    <input type="text" id="model-desc-input" placeholder="描述 (可选)" class="form-input">
                    <div class="form-actions">
                        <button class="btn-cancel" onclick="hideAddModelForm()">取消</button>
                        <button class="btn-save" onclick="saveNewModel()">保存</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 聊天容器 -->
    <div class="chat-container">
        <!-- 消息区域 -->
        <div class="chat-messages" id="chat-messages">
            <div class="empty-state">
                <i class="bi bi-chat-square-text"></i>
                <p>开始对话</p>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="chat-input-area">
            <div class="typing-indicator" id="typing-indicator">
                正在思考...
            </div>
            <div class="input-wrapper">
                <div class="input-group">
                    <textarea 
                        id="user-input" 
                        placeholder="输入消息..."
                        rows="1"
                        onkeypress="handleKeyPress(event)"></textarea>
                    <button class="btn-send" id="send-btn" onclick="sendMessage()">
                        发送
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        // 初始化Socket.IO
        const socket = io();
        let currentMessageDiv = null;
        let isThinking = false;

        // Textarea 自动调整高度
        const textarea = document.getElementById('user-input');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        // 连接事件
        socket.on('connect', () => {
            console.log('✅ 已连接到服务器');
            loadStatus();
            loadHistory(); // 加载历史消息
        });

        socket.on('disconnect', () => {
            console.log('❌ 与服务器断开连接');
            document.getElementById('status-badge').innerHTML = 
                '<i class="bi bi-circle-fill text-danger"></i> 离线';
        });

        // 加载系统状态
        async function loadStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                document.getElementById('model-name').textContent = data.model;
            } catch (error) {
                console.error('加载状态失败:', error);
            }
        }

        // 加载历史消息
        async function loadHistory() {
            try {
                const response = await fetch('/api/history');
                const history = await response.json();
                
                if (history.length > 0) {
                    // 清空空状态
                    const messagesDiv = document.getElementById('chat-messages');
                    messagesDiv.innerHTML = '';
                    
                    // 渲染历史消息
                    history.forEach(msg => {
                        if (msg.role === 'user') {
                            addUserMessage(msg.content, false); // 不滚动
                        } else if (msg.role === 'assistant') {
                            addAssistantMessage(msg.content, false); // 不滚动
                        }
                    });
                    
                    // 最后滚动到底部
                    scrollToBottom();
                }
            } catch (error) {
                console.error('加载历史失败:', error);
            }
        }

        // 发送消息
        function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            
            if (!message || isThinking) return;
            
            // 添加用户消息
            addUserMessage(message);
            
            // 清空输入框
            input.value = '';
            
            // 显示思考指示器
            showTypingIndicator();
            
            // 发送到服务器
            socket.emit('send_message', { message: message });
        }

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // 添加用户消息
        function addUserMessage(message, scroll = true) {
            const messagesDiv = document.getElementById('chat-messages');
            
            // 如果是第一条消息，清空空状态
            if (messagesDiv.querySelector('.empty-state')) {
                messagesDiv.innerHTML = '';
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user-message';
            messageDiv.innerHTML = `
                <div class="message-content">
                    ${escapeHtml(message)}
                </div>
            `;
            messagesDiv.appendChild(messageDiv);
            if (scroll) scrollToBottom();
        }

        // 添加助手消息
        function addAssistantMessage(content, scroll = true) {
            const messagesDiv = document.getElementById('chat-messages');
            
            // 如果是第一条消息，清空空状态
            if (messagesDiv.querySelector('.empty-state')) {
                messagesDiv.innerHTML = '';
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant-message';
            messageDiv.innerHTML = `
                <div class="message-content markdown-content">
                    ${marked.parse(content)}
                </div>
            `;
            messagesDiv.appendChild(messageDiv);
            if (scroll) scrollToBottom();
            return messageDiv;
        }

        // 添加工具调用
        function addToolCall(tool, args) {
            const messagesDiv = document.getElementById('chat-messages');
            const toolDiv = document.createElement('div');
            toolDiv.className = 'tool-call';
            
            // 格式化参数显示
            const argsStr = Array.isArray(args) ? args.join(', ') : args;
            
            toolDiv.innerHTML = `
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">
                    <span style="font-size: 16px;">⚙️</span>
                    <span style="font-weight: 500;">${tool}</span>
                </div>
                <div style="color: #666; font-size: 12px; margin-top: 4px;">${escapeHtml(argsStr)}</div>
            `;
            messagesDiv.appendChild(toolDiv);
            scrollToBottom();
        }

        // 添加工具结果
        function addToolResult(tool, result) {
            const messagesDiv = document.getElementById('chat-messages');
            const resultDiv = document.createElement('div');
            resultDiv.className = 'tool-result';
            
            // 判断结果类型，美化显示
            let resultContent = escapeHtml(result);
            
            // 如果是成功执行，添加图标
            if (result.includes('✅') || result.includes('成功')) {
                resultDiv.style.borderLeftColor = '#10b981';
            } else if (result.includes('❌') || result.includes('错误') || result.includes('失败')) {
                resultDiv.style.borderLeftColor = '#ef4444';
            }
            
            resultDiv.innerHTML = `
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-weight: 500;">
                    <span>📋</span>
                    <span>执行结果</span>
                </div>
                <div style="white-space: pre-wrap; line-height: 1.6;">${resultContent}</div>
            `;
            messagesDiv.appendChild(resultDiv);
            scrollToBottom();
        }

        // 显示思考指示器
        function showTypingIndicator() {
            isThinking = true;
            document.getElementById('typing-indicator').classList.add('active');
            document.getElementById('send-btn').disabled = true;
        }

        // 隐藏思考指示器
        function hideTypingIndicator() {
            isThinking = false;
            document.getElementById('typing-indicator').classList.remove('active');
            document.getElementById('send-btn').disabled = false;
        }

        // 滚动到底部
        function scrollToBottom() {
            const messagesDiv = document.getElementById('chat-messages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // 转义HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 清空历史
        function clearHistory() {
            if (confirm('确定要清空对话历史吗？')) {
                socket.emit('clear_history');
                document.getElementById('chat-messages').innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-chat-square-text"></i>
                        <p>开始对话</p>
                    </div>
                `;
            }
        }

        // Socket事件监听
        socket.on('thinking', (data) => {
            if (data.status) {
                showTypingIndicator();
            } else {
                hideTypingIndicator();
            }
        });

        // 模型选择器功能
        let modelsData = [];
        
        function showModelSelector() {
            document.getElementById('model-modal').style.display = 'flex';
            loadModels();
        }
        
        function closeModelSelector() {
            document.getElementById('model-modal').style.display = 'none';
            hideAddModelForm();
        }
        
        async function loadModels() {
            try {
                const response = await fetch('/api/models');
                modelsData = await response.json();
                renderModelList();
            } catch (error) {
                console.error('加载模型列表失败:', error);
            }
        }
        
        function renderModelList() {
            const listDiv = document.getElementById('model-list');
            const currentModel = document.getElementById('model-name').textContent;
            
            listDiv.innerHTML = modelsData.map(model => `
                <div class="model-item ${model.name === currentModel ? 'active' : ''}" 
                     onclick="switchModel('${model.name}')">
                    <div class="model-item-header">
                        <span class="model-item-name">${model.name}</span>
                        ${model.name === currentModel ? '<span class="model-item-badge">当前</span>' : ''}
                    </div>
                    <div class="model-item-api">${model.api_base}</div>
                    ${model.description ? `<div class="model-item-desc">${model.description}</div>` : ''}
                </div>
            `).join('');
        }
        
        async function switchModel(modelName) {
            try {
                const response = await fetch('/api/model/switch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model_name: modelName })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('model-name').textContent = modelName;
                    closeModelSelector();
                    
                    // 显示提示
                    showToast(`已切换到: ${modelName}\n注意: 需要重启JwClaw才能生效`);
                } else {
                    alert('切换失败: ' + result.error);
                }
            } catch (error) {
                console.error('切换模型失败:', error);
                alert('切换失败: ' + error.message);
            }
        }
        
        function showAddModelForm() {
            document.getElementById('add-model-form').style.display = 'block';
        }
        
        function hideAddModelForm() {
            document.getElementById('add-model-form').style.display = 'none';
            // 清空表单
            document.getElementById('model-name-input').value = '';
            document.getElementById('model-api-input').value = '';
            document.getElementById('model-key-input').value = '';
            document.getElementById('model-desc-input').value = '';
        }
        
        async function saveNewModel() {
            const name = document.getElementById('model-name-input').value.trim();
            const api_base = document.getElementById('model-api-input').value.trim();
            const api_key = document.getElementById('model-key-input').value.trim();
            const description = document.getElementById('model-desc-input').value.trim();
            
            if (!name || !api_base || !api_key) {
                alert('请填写必填字段：模型名称、API地址、API密钥');
                return;
            }
            
            try {
                const response = await fetch('/api/model/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, api_base, api_key, description })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast('模型添加成功！');
                    hideAddModelForm();
                    loadModels(); // 重新加载列表
                } else {
                    alert('添加失败: ' + result.error);
                }
            } catch (error) {
                console.error('添加模型失败:', error);
                alert('添加失败: ' + error.message);
            }
        }
        
        function showToast(message) {
            // 创建简单的toast提示
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: #000;
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 14px;
                z-index: 2000;
                animation: fadeIn 0.3s ease-in;
                white-space: pre-line;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        socket.on('thinking_content', (data) => {
            // 显示思考过程
            if (!currentMessageDiv) {
                currentMessageDiv = addAssistantMessage('');
            }
            
            // 查找或创建思考内容容器
            let thinkingDiv = currentMessageDiv.querySelector('.thinking-content');
            if (!thinkingDiv) {
                thinkingDiv = document.createElement('div');
                thinkingDiv.className = 'thinking-content';
                currentMessageDiv.querySelector('.message-content').insertBefore(
                    thinkingDiv, 
                    currentMessageDiv.querySelector('.message-content').firstChild
                );
            }
            
            thinkingDiv.textContent += data.content;
            scrollToBottom();
        });

        socket.on('reply_content', (data) => {
            // 流式接收回复内容
            if (!currentMessageDiv) {
                currentMessageDiv = addAssistantMessage('');
            }
            
            const contentDiv = currentMessageDiv.querySelector('.markdown-content');
            
            // 移除思考内容（如果存在）
            const thinkingDiv = contentDiv.querySelector('.thinking-content');
            if (thinkingDiv && data.type === 'separator') {
                thinkingDiv.remove();
            }
            
            // 添加新内容
            if (data.type !== 'separator') {
                contentDiv.innerHTML += data.content;
            }
            
            // 使用requestAnimationFrame优化滚动性能
            requestAnimationFrame(() => {
                scrollToBottom();
            });
        });

        socket.on('message_complete', (data) => {
            currentMessageDiv = null;
            hideTypingIndicator();
        });

        socket.on('tool_call', (data) => {
            addToolCall(data.tool, data.args);
        });

        socket.on('tool_result', (data) => {
            addToolResult(data.tool, data.result);
        });

        socket.on('error', (data) => {
            console.error('错误:', data.message);
            hideTypingIndicator();
            alert('错误: ' + data.message);
        });

        socket.on('history_cleared', (data) => {
            console.log(data.message);
        });
    </script>
</body>
</html>
