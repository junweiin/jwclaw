<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JwClaw - 智能体系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #000000;
            --secondary-color: #666666;
            --bg-color: #ffffff;
            --chat-bg: #fafafa;
            --border-color: #e5e5e5;
            --hover-bg: #f5f5f5;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--primary-color);
            line-height: 1.6;
        }
        
        /* 简洁的顶部栏 */
        .header {
            padding: 20px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: -0.3px;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--secondary-color);
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
        }
        
        .btn-icon {
            background: none;
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: var(--secondary-color);
            transition: all 0.2s;
        }
        
        .btn-icon:hover {
            background: var(--hover-bg);
            border-color: #d0d0d0;
        }
        
        /* 聊天容器 */
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            height: calc(100vh - 140px);
            display: flex;
            flex-direction: column;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }
        
        /* 消息样式 - 极简 */
        .message {
            margin-bottom: 32px;
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            text-align: right;
        }
        
        .user-message .message-content {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 70%;
            font-size: 15px;
            line-height: 1.5;
        }
        
        .assistant-message {
            text-align: left;
        }
        
        .assistant-message .message-content {
            display: inline-block;
            color: var(--primary-color);
            padding: 0;
            max-width: 100%;
            font-size: 15px;
            line-height: 1.7;
        }
        
        /* 思考过程 - 低调显示 */
        .thinking-content {
            color: #999;
            font-size: 13px;
            margin-bottom: 12px;
            padding: 8px 0;
            border-left: 2px solid #e0e0e0;
            padding-left: 12px;
        }
        
        /* 工具调用 - 简洁 */
        .tool-call {
            background: #f8f8f8;
            color: #555;
            padding: 10px 14px;
            border-radius: 8px;
            margin: 12px 0;
            font-size: 13px;
            font-family: 'Monaco', 'Consolas', monospace;
        }
        
        .tool-result {
            background: #f8f8f8;
            color: #333;
            padding: 12px 14px;
            border-radius: 8px;
            margin: 12px 0;
            font-size: 13px;
            font-family: 'Monaco', 'Consolas', monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
            border-left: 3px solid #ddd;
        }
        
        /* 输入区域 - 极简 */
        .chat-input-area {
            padding: 20px 40px;
            border-top: 1px solid var(--border-color);
            background: white;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .typing-indicator {
            display: none;
            padding: 8px 0;
            color: #999;
            font-size: 13px;
        }
        
        .typing-indicator.active {
            display: block;
        }
        
        .input-group {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        
        #user-input {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 15px;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
            min-height: 50px;
            max-height: 150px;
        }
        
        #user-input:focus {
            border-color: #999;
        }
        
        .btn-send {
            background: var(--primary-color);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .btn-send:hover {
            background: #333;
            transform: translateY(-1px);
        }
        
        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Markdown 内容 */
        .markdown-content {
            line-height: 1.7;
        }
        
        .markdown-content p {
            margin-bottom: 12px;
        }
        
        .markdown-content code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: 'Monaco', 'Consolas', monospace;
        }
        
        .markdown-content pre {
            background: #f8f8f8;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
            border: 1px solid #e5e5e5;
        }
        
        .markdown-content pre code {
            background: none;
            padding: 0;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #999;
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
        
        .empty-state p {
            font-size: 15px;
        }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #ccc;
        }
    </style>
</head>
<body>
    <!-- 简洁的顶部栏 -->
    <div class="header">
        <h1>JwClaw</h1>
        <div class="header-actions">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span id="model-name">加载中...</span>
            </div>
            <button class="btn-icon" onclick="clearHistory()">
                清空
            </button>
        </div>
    </div>

    <!-- 聊天容器 -->
    <div class="chat-container">
        <!-- 消息区域 -->
        <div class="chat-messages" id="chat-messages">
            <div class="empty-state">
                <i class="bi bi-chat-square-text"></i>
                <p>开始对话</p>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="chat-input-area">
            <div class="typing-indicator" id="typing-indicator">
                正在思考...
            </div>
            <div class="input-wrapper">
                <div class="input-group">
                    <textarea 
                        id="user-input" 
                        placeholder="输入消息..."
                        rows="1"
                        onkeypress="handleKeyPress(event)"></textarea>
                    <button class="btn-send" id="send-btn" onclick="sendMessage()">
                        发送
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        // 初始化Socket.IO
        const socket = io();
        let currentMessageDiv = null;
        let isThinking = false;

        // Textarea 自动调整高度
        const textarea = document.getElementById('user-input');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        // 连接事件
        socket.on('connect', () => {
            console.log('✅ 已连接到服务器');
            loadStatus();
            loadHistory(); // 加载历史消息
        });

        socket.on('disconnect', () => {
            console.log('❌ 与服务器断开连接');
            document.getElementById('status-badge').innerHTML = 
                '<i class="bi bi-circle-fill text-danger"></i> 离线';
        });

        // 加载系统状态
        async function loadStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                document.getElementById('model-name').textContent = data.model;
            } catch (error) {
                console.error('加载状态失败:', error);
            }
        }

        // 加载历史消息
        async function loadHistory() {
            try {
                const response = await fetch('/api/history');
                const history = await response.json();
                
                if (history.length > 0) {
                    // 清空空状态
                    const messagesDiv = document.getElementById('chat-messages');
                    messagesDiv.innerHTML = '';
                    
                    // 渲染历史消息
                    history.forEach(msg => {
                        if (msg.role === 'user') {
                            addUserMessage(msg.content, false); // 不滚动
                        } else if (msg.role === 'assistant') {
                            addAssistantMessage(msg.content, false); // 不滚动
                        }
                    });
                    
                    // 最后滚动到底部
                    scrollToBottom();
                }
            } catch (error) {
                console.error('加载历史失败:', error);
            }
        }

        // 发送消息
        function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            
            if (!message || isThinking) return;
            
            // 添加用户消息
            addUserMessage(message);
            
            // 清空输入框
            input.value = '';
            
            // 显示思考指示器
            showTypingIndicator();
            
            // 发送到服务器
            socket.emit('send_message', { message: message });
        }

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // 添加用户消息
        function addUserMessage(message, scroll = true) {
            const messagesDiv = document.getElementById('chat-messages');
            
            // 如果是第一条消息，清空空状态
            if (messagesDiv.querySelector('.empty-state')) {
                messagesDiv.innerHTML = '';
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user-message';
            messageDiv.innerHTML = `
                <div class="message-content">
                    ${escapeHtml(message)}
                </div>
            `;
            messagesDiv.appendChild(messageDiv);
            if (scroll) scrollToBottom();
        }

        // 添加助手消息
        function addAssistantMessage(content, scroll = true) {
            const messagesDiv = document.getElementById('chat-messages');
            
            // 如果是第一条消息，清空空状态
            if (messagesDiv.querySelector('.empty-state')) {
                messagesDiv.innerHTML = '';
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant-message';
            messageDiv.innerHTML = `
                <div class="message-content markdown-content">
                    ${marked.parse(content)}
                </div>
            `;
            messagesDiv.appendChild(messageDiv);
            if (scroll) scrollToBottom();
            return messageDiv;
        }

        // 添加工具调用
        function addToolCall(tool, args) {
            const messagesDiv = document.getElementById('chat-messages');
            const toolDiv = document.createElement('div');
            toolDiv.className = 'tool-call';
            
            // 格式化参数显示
            const argsStr = Array.isArray(args) ? args.join(', ') : args;
            
            toolDiv.innerHTML = `
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">
                    <span style="font-size: 16px;">⚙️</span>
                    <span style="font-weight: 500;">${tool}</span>
                </div>
                <div style="color: #666; font-size: 12px; margin-top: 4px;">${escapeHtml(argsStr)}</div>
            `;
            messagesDiv.appendChild(toolDiv);
            scrollToBottom();
        }

        // 添加工具结果
        function addToolResult(tool, result) {
            const messagesDiv = document.getElementById('chat-messages');
            const resultDiv = document.createElement('div');
            resultDiv.className = 'tool-result';
            
            // 判断结果类型，美化显示
            let resultContent = escapeHtml(result);
            
            // 如果是成功执行，添加图标
            if (result.includes('✅') || result.includes('成功')) {
                resultDiv.style.borderLeftColor = '#10b981';
            } else if (result.includes('❌') || result.includes('错误') || result.includes('失败')) {
                resultDiv.style.borderLeftColor = '#ef4444';
            }
            
            resultDiv.innerHTML = `
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-weight: 500;">
                    <span>📋</span>
                    <span>执行结果</span>
                </div>
                <div style="white-space: pre-wrap; line-height: 1.6;">${resultContent}</div>
            `;
            messagesDiv.appendChild(resultDiv);
            scrollToBottom();
        }

        // 显示思考指示器
        function showTypingIndicator() {
            isThinking = true;
            document.getElementById('typing-indicator').classList.add('active');
            document.getElementById('send-btn').disabled = true;
        }

        // 隐藏思考指示器
        function hideTypingIndicator() {
            isThinking = false;
            document.getElementById('typing-indicator').classList.remove('active');
            document.getElementById('send-btn').disabled = false;
        }

        // 滚动到底部
        function scrollToBottom() {
            const messagesDiv = document.getElementById('chat-messages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // 转义HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 清空历史
        function clearHistory() {
            if (confirm('确定要清空对话历史吗？')) {
                socket.emit('clear_history');
                document.getElementById('chat-messages').innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-chat-square-text"></i>
                        <p>开始对话</p>
                    </div>
                `;
            }
        }

        // Socket事件监听
        socket.on('thinking', (data) => {
            if (data.status) {
                showTypingIndicator();
            } else {
                hideTypingIndicator();
            }
        });

        socket.on('thinking_content', (data) => {
            // 可以在这里显示思考过程
            console.log('思考:', data.content);
        });

        socket.on('reply_content', (data) => {
            // 流式接收回复内容
            if (!currentMessageDiv) {
                currentMessageDiv = addAssistantMessage('');
            }
            const contentDiv = currentMessageDiv.querySelector('.markdown-content');
            contentDiv.innerHTML += data.content;
            scrollToBottom();
        });

        socket.on('message_complete', (data) => {
            currentMessageDiv = null;
            hideTypingIndicator();
        });

        socket.on('tool_call', (data) => {
            addToolCall(data.tool, data.args);
        });

        socket.on('tool_result', (data) => {
            addToolResult(data.tool, data.result);
        });

        socket.on('error', (data) => {
            console.error('错误:', data.message);
            hideTypingIndicator();
            alert('错误: ' + data.message);
        });

        socket.on('history_cleared', (data) => {
            console.log(data.message);
        });
    </script>
</body>
</html>
